aid: securiti-ai
name: Securiti
description: >-
  Securiti is a San Jose, California data security, privacy, and AI governance
  company that markets the Data Command Center, a unified hybrid multicloud
  platform for sensitive data discovery, classification, security posture
  management, privacy operations, and AI governance. The platform is built on
  the Data Command Graph, a knowledge-graph layer that correlates data assets,
  identities, regulations, and AI systems across 1,000+ pre-built connectors
  spanning AWS, Azure, Google Cloud, Snowflake, Databricks, and major SaaS
  applications. Securiti's product surface includes Data Security Posture
  Management (DSPM), Sensitive Data Intelligence, Data Access Intelligence,
  Data Flow Governance, Data Minimization, Breach Impact Analysis, Data
  Subject Request (DSR) Automation, Universal Consent Management, Mobile App
  Consent SDKs, Assessment Automation, Data Mapping, Privacy Center, the
  People Data Graph, Data Catalog, Data Lineage, Data Quality, Compliance
  Management, AI Security and Governance, Agent Commander for AI risk
  detection, Security for AI Agents and Copilots, and the Gencore AI suite for
  safe enterprise AI copilots, vector-database synchronization, unstructured
  data curation, and context-aware LLM firewalls. The platform exposes
  REST-based APIs, a turnkey JavaScript consent library, standards-based
  webhook interfaces, no-code/low-code workflow integrations, and native
  mobile SDKs for iOS and Android consent capture. The API reference, SDKs,
  consent banner generators, and connector catalog are all reached through
  the Securiti app and Privacy Center; full API documentation requires an
  authenticated tenant. Securiti was founded in 2018 by Rehan Jalil and has
  been recognized as a Gartner Customers' Choice and an IDC Worldwide Leader
  in data privacy and data security. The company's revenue model is
  enterprise SaaS subscription with usage-based connector and module pricing;
  no public free tier or self-serve API key issuance is currently offered.
